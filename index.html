<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nailah Birthday Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<section class="cover">

<div class="invite-card">
<h1>You've been invited!</h1>
<button id="openBtn">Click HERE</button>
</div>

</section>

<section class="page hidden" id="page1">

<img src="assets/flower.png" class="flower top-left">

<div class="name-card">

<p>You are Invited to:</p>

<h2>Nailah's</h2>

<h3>Birthday Party</h3>

<span>20.06.26</span>

</div>

<img src="assets/ribbon.png" class="ribbon">

<button id="playMusic" class="music-btn">
▶
</button>

</section>

<section class="page hidden green-page">

<div class="date-left">
<h1>20</h1>
<p>June</p>
<p>2026</p>
</div>

<div class="time-right">
5 PM
</div>

<img src="assets/gazebo.png" class="gazebo">

<h2>SMART HOTEL</h2>

<a href="https://maps.app.goo.gl/LBNzWNpbZWPsH7SPA"
target="_blank"
class="map-btn">
View Map
</a>

<div class="dresscode">

<h3>Dresscode</h3>

<div class="dress-images">
<img src="assets/pantone.jpg" alt="Pantone Black">
</div>

</div>

<div class="dots">
<span></span>
<span></span>
</div>

</section>

<section class="page hidden rsvp-page">

<div class="rsvp-card">

<h2>RSVP</h2>

<input type="text" placeholder="Your Name">

<select>
<option>Absolutely, wouldn't miss it!</option>
<option>Can't make it this time.</option>
</select>

<button>
RSVP NOW
</button>

</div>

</section>

<script src="script.js"></script>

<footer class="watermark">
<p>Designed by Khairunnisaa</p>
<p>Email: khairunnisaa.asmara@gmail.com</p>
<p>Phone: +62 82285344045</p>
</footer>

</body>
</html>
